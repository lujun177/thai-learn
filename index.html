<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai 零基础 - Rayong版 v3.2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .word-span { cursor: pointer; padding: 0 2px; border-radius: 3px; }
  .word-span:hover { background: #dbeafe; }
  .letter-btn { font-family: 'Noto Sans Thai', sans-serif; }
  .tone-low{color:#3b82f6}.tone-mid{color:#10b981}.tone-high{color:#ef4444}
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
  <div class="max-w-md mx-auto min-h-screen flex flex-col">
    <header class="bg-blue-600 text-white p-4 text-center font-bold text-lg">
      Thai 零基础 - 44辅音+32元音
    </header>

    <main id="main" class="flex-1 p-4 pb-20 overflow-y-auto">
      <!-- 字母 Tab 全新版 -->
      <div id="tab-letter" class="tab-content active">
        <h2 class="text-xl font-bold mb-2">字母支柱 - 辅音 Consonants</h2>
        <div class="text-xs text-gray-500 mb-2">
          <span class="tone-mid">■中辅音9个</span>
          <span class="tone-high">■高辅音10个</span>
          <span class="tone-low">■低辅音25个</span>
        </div>
        <div id="consonant-grid" class="grid grid-cols-5 gap-1 text-center mb-4"></div>

        <h2 class="text-xl font-bold mb-2">元音 Vowels</h2>
        <div id="vowel-grid" class="grid grid-cols-4 gap-1 text-center"></div>

        <div class="mt-4 bg-white p-3 rounded shadow">
          <div class="text-2xl font-bold text-center" id="current-char">ก</div>
          <div class="text-sm text-center text-gray-500" id="current-info">gor gai 中辅音 /g/</div>
          <canvas id="canvas" class="border w-full h-40 mt-2 bg-white"></canvas>
          <div class="flex gap-2 mt-2">
            <button onclick="clearCanvas()" class="bg-gray-300 px-3 py-1 rounded flex-1">清空</button>
            <button onclick="speak(currentChar)" class="bg-blue-500 text-white px-3 py-1 rounded flex-1">🔊 读一下</button>
          </div>
        </div>
      </div>

      <!-- 其他Tab保持不变，代码省略以免太长 -->
      <div id="tab-word" class="tab-content">
        <h2 class="text-xl font-bold mb-3">单词支柱 - 每日30词</h2>
        <div id="word-list" class="space-y-2"></div>
      </div>
      <div id="tab-sentence" class="tab-content">
        <h2 class="text-xl font-bold mb-3">句子支柱 - 跟读打分</h2>
        <div id="sentence-box" class="bg-white p-3 rounded shadow"></div>
        <div class="flex gap-2 mt-3">
          <button onclick="speakSentence()" class="bg-blue-500 text-white px-3 py-1 rounded">🔊 标准音</button>
          <button onclick="toggleRecord()" id="rec-btn" class="bg-red-500 text-white px-3 py-1 rounded">🎤 录音</button>
        </div>
        <audio id="user-audio" controls class="w-full mt-2 hidden"></audio>
      </div>
      <div id="tab-read" class="tab-content">
        <h2 class="text-xl font-bold mb-3">浸泡支柱 - 随机常用句</h2>
        <div id="read-sentence" class="bg-white p-4 rounded shadow text-lg leading-8"></div>
        <div class="flex gap-2 mt-3">
          <button onclick="randomSentence()" class="bg-blue-500 text-white px-3 py-1 rounded">换一篇</button>
          <button onclick="speakFullSentence()" class="bg-green-500 text-white px-3 py-1 rounded">连续播放</button>
        </div>
      </div>
      <div id="tab-rayong" class="tab-content">
        <h2 class="text-xl font-bold mb-3">Rayong本地菜单 🍗</h2>
        <div id="rayong-list" class="space-y-2"></div>
        <button onclick="showRayongDialogue()" class="mt-4 w-full bg-orange-500 text-white py-2 rounded">点餐实战对话</button>
        <div id="rayong-dialogue" class="bg-yellow-50 p-3 mt-3 rounded hidden"></div>
      </div>
      <div id="tab-seven" class="tab-content">
        <h2 class="text-xl font-bold mb-3">7-11购物 🛒</h2>
        <div id="seven-list" class="space-y-2"></div>
        <button onclick="showSevenDialogue()" class="mt-4 w-full bg-green-600 text-white py-2 rounded">结账实战对话</button>
        <div id="seven-dialogue" class="bg-green-50 p-3 mt-3 rounded hidden"></div>
      </div>
      <div id="tab-check" class="tab-content">
        <h2 class="text-xl font-bold mb-3">30天打卡 - 闯关锁</h2>
        <div class="bg-white p-3 rounded shadow">
          <p>今日得分: <span id="today-score" class="font-bold text-blue-600">0</span> / 50</p>
          <div class="w-full bg-gray-200 rounded-full h-2.5 mt-2">
            <div id="score-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
          </div>
          <div id="quiz-box" class="mt-4"></div>
          <div id="lock-msg" class="text-red-500 mt-3 hidden">今日得分不足50，明天内容未解锁</div>
        </div>
      </div>
    </main>

    <nav class="fixed bottom-0 w-full max-w-md bg-white border-t flex justify-around text-xs">
      <button onclick="switchTab('letter')" class="p-2 flex-1">字母</button>
      <button onclick="switchTab('word')" class="p-2 flex-1">单词</button>
      <button onclick="switchTab('sentence')" class="p-2 flex-1">句子</button>
      <button onclick="switchTab('read')" class="p-2 flex-1">阅读</button>
      <button onclick="switchTab('rayong')" class="p-2 flex-1">菜单</button>
      <button onclick="switchTab('seven')" class="p-2 flex-1">7-11</button>
      <button onclick="switchTab('check')" class="p-2 flex-1">打卡</button>
    </nav>
  </div>

<script>
// ===== 44个辅音数据 =====
const consonants = [
  {ch:'ก', name:'gor gai', type:'mid', sound:'/g/', eg:'ไก่ 鸡'}, {ch:'ข', name:'khor khai', type:'high', sound:'/kh/'},
  {ch:'ฃ', name:'khor khuat', type:'high', sound:'/kh/ 废弃'}, {ch:'ค', name:'khor khwai', type:'low', sound:'/kh/'},
  {ch:'ฅ', name:'khor khon', type:'low', sound:'/kh/ 废弃'}, {ch:'ฆ', name:'khor ra-khang', type:'low', sound:'/kh/'},
  {ch:'ง', name:'ngor ngu', type:'low', sound:'/ng/'}, {ch:'จ', name:'jor jaan', type:'mid', sound:'/j/'},
  {ch:'ฉ', name:'chor ching', type:'high', sound:'/ch/'}, {ch:'ช', name:'chor chaang', type:'low', sound:'/ch/'},
  {ch:'ซ', name:'sor so', type:'low', sound:'/s/'}, {ch:'ฌ', name:'chor chəə', type:'low', sound:'/ch/'},
  {ch:'ญ', name:'yor ying', type:'low', sound:'/y/'}, {ch:'ฎ', name:'dor cha-daa', type:'mid', sound:'/d/'},
  {ch:'ฏ', name:'dtor bpa-dtak', type:'mid', sound:'/dt/'}, {ch:'ฐ', name:'thor than', type:'high', sound:'/th/'},
  {ch:'ฑ', name:'thor mon-tho', type:'low', sound:'/th/'}, {ch:'ฒ', name:'thor phuu-thao', type:'low', sound:'/th/'},
  {ch:'ณ', name:'nor naen', type:'low', sound:'/n/'}, {ch:'ด', name:'dor dek', type:'mid', sound:'/d/'},
  {ch:'ต', name:'dtor dtao', type:'mid', sound:'/dt/'}, {ch:'ถ', name:'thor thung', type:'high', sound:'/th/'},
  {ch:'ท', name:'thor thahan', type:'low', sound:'/th/'}, {ch:'ธ', name:'thor thong', type:'low', sound:'/th/'},
  {ch:'น', name:'nor nuu', type:'low', sound:'/n/'}, {ch:'บ', name:'bor bai-mai', type:'mid', sound:'/b/'},
  {ch:'ป', name:'bpor bplaa', type:'mid', sound:'/bp/'}, {ch:'ผ', name:'phor pheung', type:'high', sound:'/ph/'},
  {ch:'ฝ', name:'for faa', type:'high', sound:'/f/'}, {ch:'พ', name:'phor phaan', type:'low', sound:'/ph/'},
  {ch:'ฟ', name:'for fan', type:'low', sound:'/f/'}, {ch:'ภ', name:'phor sam-phao', type:'low', sound:'/ph/'},
  {ch:'ม', name:'mor maa', type:'low', sound:'/m/'}, {ch:'ย', name:'yor yak', type:'low', sound:'/y/'},
  {ch:'ร', name:'ror reua', type:'low', sound:'/r/'}, {ch:'ล', name:'lor ling', type:'low', sound:'/l/'},
  {ch:'ว', name:'wor waen', type:'low', sound:'/w/'}, {ch:'ศ', name:'sor saa-laa', type:'high', sound:'/s/'},
  {ch:'ษ', name:'sor reu-sii', type:'high', sound:'/s/'}, {ch:'ส', name:'sor seua', type:'high', sound:'/s/'},
  {ch:'ห', name:'hor hiip', type:'high', sound:'/h/'}, {ch:'ฬ', name:'lor ju-laa', type:'low', sound:'/l/'},
  {ch:'อ', name:'or aang', type:'mid', sound:'/ʔ/'}, {ch:'ฮ', name:'hor nok-huuk', type:'low', sound:'/h/'}
];

// ===== 32个元音数据 =====
const vowels = [
  {ch:'-ะ', name:'sara a', sound:'/a/ 短'}, {ch:'-ั-', name:'mai han-akat', sound:'/a/ 短'},
  {ch:'-า', name:'sara aa', sound:'/aa/ 长'}, {ch:'-ิ', name:'sara i', sound:'/i/ 短'},
  {ch:'-ี', name:'sara ii', sound:'/ii/ 长'}, {ch:'-ึ', name:'sara ue', sound:'/ue/ 短'},
  {ch:'-ื', name:'sara uee', sound:'/uee/ 长'}, {ch:'-ุ', name:'sara u', sound:'/u/ 短'},
  {ch:'-ู', name:'sara uu', sound:'/uu/ 长'}, {ch:'เ-ะ', name:'sara e', sound:'/e/ 短'},
  {ch:'เ-', name:'sara ee', sound:'/ee/ 长'}, {ch:'แ-ะ', name:'sara ae', sound:'/ae/ 短'},
  {ch:'แ-', name:'sara aae', sound:'/aae/ 长'}, {ch:'โ-ะ', name:'sara o', sound:'/o/ 短'},
  {ch:'โ-', name:'sara oo', sound:'/oo/ 长'}, {ch:'เ-าะ', name:'sara ɔ', sound:'/ɔ/ 短'},
  {ch:'-อ', name:'sara ɔɔ', sound:'/ɔɔ/ 长'}, {ch:'เ-อะ', name:'sara ə', sound:'/ə/ 短'},
  {ch:'เ-อ', name:'sara əə', sound:'/əə/ 长'}, {ch:'เ-ียะ', name:'sara ia', sound:'/ia/ 短'},
  {ch:'เ-ีย', name:'sara iia', sound:'/iia/ 长'}, {ch:'เ-ือะ', name:'sara uea', sound:'/uea/ 短'},
  {ch:'เ-ือ', name:'sara ueaa', sound:'/ueaa/ 长'}, {ch:'-ัวะ', name:'sara ua', sound:'/ua/ 短'},
  {ch:'-ัว', name:'sara uaa', sound:'/uaa/ 长'}, {ch:'ำ', name:'sara am', sound:'/am/'},
  {ch:'ไ-', name:'sara ai mai ma-lai', sound:'/ai/'}, {ch:'ใ-', name:'sara ai mai muan', sound:'/ai/'},
  {ch:'เ-า', name:'sara ao', sound:'/ao/'}, {ch:'ฤ', name:'ru', sound:'/rue/ 短'},
  {ch:'ฤา', name:'ruu', sound:'/ruu/ 长'}, {ch:'ฦ', name:'lue', sound:'/lue/ 短'}
];

const words = [
  {th:'สวัสดี',rt:'sà-wàt-dii',zh:'你好',mp3:'https://www.thai-language.com/audio/S001.mp3'},
  {th:'ขอบคุณ',rt:'kɔ̀ɔp-kun',zh:'谢谢',mp3:'https://www.thai-language.com/audio/T001.mp3'},
  {th:'ใช่',rt:'châi',zh:'是'}, {th:'ไม่ใช่',rt:'mâi châi',zh:'不是'}, {th:'เท่าไหร่',rt:'tâo rài',zh:'多少'}
];
const sentences = [
  'ผมขอข้าวผัดไก่ ไม่ใส่พริกครับ|pǒm kɔ̌ɔ kâao pàt gài mâi sài prík kráp|我要鸡肉炒饭，不要辣',
  'ห้องน้ำอยู่ไหนครับ|hɔ̂ng náam yùu nǎi kráp|洗手间在哪',
  'อันนี้เท่าไหร่ ลดได้ไหม|an níi tâo rài lót dâai mái|这个多少，能便宜吗',
  'ไปตลาดระยองยังไง|bpai dtà-làat rá-yɔɔng yang-ngai|去罗勇市场怎么走',
  'ไม่เผ็ดครับ|mâi pèt kráp|不要辣'
];

let currentChar = 'ก';
let mediaRecorder, audioChunks = [];
let todayScore = 0;
let rayongData = [], sevenData = [];

// ===== 初始化 =====
init();
async function init(){
  renderConsonants();
  renderVowels();
  renderWords();
  randomSentence();
  loadTodayScore();
  loadQuiz();
  try {
    rayongData = await fetch('./rayong.json').then(r=>r.json());
    sevenData = await fetch('./seven.json').then(r=>r.json());
    renderRayong();
    renderSeven();
  } catch(e){}
  updateCharInfo(consonants[0]);
}

// ===== 渲染44辅音 =====
function renderConsonants(){
  const grid = document.getElementById('consonant-grid');
  consonants.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = `letter-btn bg-white border p-1 rounded text-lg tone-${c.type}`;
    btn.textContent = c.ch;
    btn.onclick = ()=>{ currentChar = c.ch; updateCharInfo(c); speak(c.ch); };
    grid.appendChild(btn);
  });
}

// ===== 渲染32元音 =====
function renderVowels(){
  const grid = document.getElementById('vowel-grid');
  vowels.forEach(v=>{
    const btn = document.createElement('button');
    btn.className = 'letter-btn bg-white border p-1 rounded text-sm';
    btn.textContent = v.ch;
    btn.onclick = ()=>{ currentChar = v.ch; updateCharInfo(v); speak(v.ch.replace('-','ก')); };
    grid.appendChild(btn);
  });
}

function updateCharInfo(obj){
  document.getElementById('current-char').textContent = obj.ch;
  document.getElementById('current-info').textContent = `${obj.name || ''} ${obj.sound || ''} ${obj.eg || ''}`;
}

function switchTab(name){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// ===== 手写板 =====
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let drawing = false;
canvas.onmousedown = e=>{drawing=true; ctx.beginPath(); ctx.moveTo(e.offsetX,e.offsetY);}
canvas.onmousemove = e=>{if(drawing){ctx.lineTo(e.offsetX,e.offsetY); ctx.stroke();}}
canvas.onmouseup = ()=>{drawing=false; speak(currentChar);}
canvas.ontouchstart = e=>{drawing=true; const t=e.touches[0]; const r=canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(t.clientX-r.left,t.clientY-r.top);}
canvas.ontouchmove = e=>{if(drawing){const t=e.touches[0]; const r=canvas.getBoundingClientRect(); ctx.lineTo(t.clientX-r.left,t.clientY-r.top); ctx.stroke();}}
canvas.ontouchend = ()=>{drawing=false; speak(currentChar);}
function clearCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height);}

// ===== 单词/句子/阅读/菜单/7-11/打卡模块，代码同v3.1，省略=======
// 为节省篇幅，这里用注释代替，实际你复制时要把v3.1里对应函数全贴上
function renderWords(){
  const list = document.getElementById('word-list');
  list.innerHTML = '';
  words.forEach(w=>{
    const div = document.createElement('div');
    div.className = 'bg-white p-2 rounded shadow flex justify-between items-center';
    div.innerHTML = `<div><div class="font-bold">${w.th}</div><div class="text-xs text-gray-500">${w.rt} | ${w.zh}</div></div>
                     <button onclick="speakWord('${w.th}','${w.mp3||''}')" class="bg-blue-100 px-2 py-1 rounded">🔊</button>`;
    list.appendChild(div);
  });
}
function renderSentence(){
  const [th,rt,zh] = sentences[0].split('|');
  document.getElementById('sentence-box').innerHTML = `<div class="text-lg">${th}</div><div class="text-sm text-gray-500">${rt}</div><div>${zh}</div>`;
}
renderSentence();
function speakSentence(){ speak(sentences[0].split('|')[0]); }
async function toggleRecord(){
  const btn = document.getElementById('rec-btn');
  if(!mediaRecorder){
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e=>audioChunks.push(e.data);
    mediaRecorder.onstop = ()=>{
      const blob = new Blob(audioChunks,{type:'audio/webm'});
      document.getElementById('user-audio').src = URL.createObjectURL(blob);
      document.getElementById('user-audio').classList.remove('hidden');
      audioChunks = [];
    }
  }
  if(mediaRecorder.state === 'inactive'){
    mediaRecorder.start(); btn.textContent = '⏹ 停止'; btn.classList.replace('bg-red-500','bg-gray-500');
  } else {
    mediaRecorder.stop(); btn.textContent = '🎤 录音'; btn.classList.replace('bg-gray-500','bg-red-500');
  }
}
function randomSentence(){
  const idx = Math.floor(Math.random()*sentences.length);
  const [th,rt,zh] = sentences[idx].split('|');
  const words = th.split(' ');
  document.getElementById('read-sentence').innerHTML = words.map(w=>`<span class="word-span" onclick="speak('${w}')">${w}</span>`).join(' ') + `<div class="text-sm text-gray-500 mt-2">${rt}</div><div>${zh}</div>`;
  window.currentReadTh = th;
}
function speakFullSentence(){ speak(window.currentReadTh); }
function renderRayong(){
  const list = document.getElementById('rayong-list');
  rayongData.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'bg-white p-2 rounded shadow flex justify-between';
    div.innerHTML = `<div>${item.emoji} <b>${item.th}</b> ${item.zh} <span class="text-xs text-gray-500">${item.rt} | ${item.price}</span></div>
                     <button onclick="speak('${item.th}')" class="bg-orange-100 px-2 py-1 rounded">🔊</button>`;
    list.appendChild(div);
  });
}
function showRayongDialogue(){
  document.getElementById('rayong-dialogue').classList.remove('hidden');
  document.getElementById('rayong-dialogue').innerHTML = `
    <div onclick="speak('เอา ข้าวมันไก่ หนึ่งจานครับ')" class="cursor-pointer">你：เอา ข้าวมันไก่ หนึ่งจานครับ<br><span class="text-xs text-gray-500">要一份海南鸡饭</span></div>
    <div onclick="speak('ได้ครับ 50 บาท')" class="cursor-pointer mt-2">老板：ได้ครับ 50 บาท<br><span class="text-xs text-gray-500">好的，50泰铢</span></div>
  `;
}
function renderSeven(){
  const list = document.getElementById('seven-list');
  sevenData.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'bg-white p-2 rounded shadow flex justify-between';
    div.innerHTML = `<div>${item.emoji} <b>${item.th}</b> ${item.zh} <span class="text-xs text-gray-500">${item.rt} | ${item.price}</span></div>
                     <button onclick="speak('${item.th}')" class="bg-green-100 px-2 py-1 rounded">🔊</button>`;
    list.appendChild(div);
  });
}
function showSevenDialogue(){
  document.getElementById('seven-dialogue').classList.remove('hidden');
  document.getElementById('seven-dialogue').innerHTML = `
    <div onclick="speak('คิดเงินด้วยครับ')" class="cursor-pointer">你：คิดเงินด้วยครับ<br><span class="text-xs text-gray-500">结账</span></div>
    <div onclick="speak('ทั้งหมด 78 บาทครับ')" class="cursor-pointer mt-2">店员：ทั้งหมด 78 บาทครับ<br><span class="text-xs text-gray-500">一共78泰铢</span></div>
    <div onclick="speak('สแกนจ่ายได้ไหม')" class="cursor-pointer mt-2">你：สแกนจ่ายได้ไหม<br><span class="text-xs text-gray-500">能扫码支付吗</span></div>
  `;
}
function loadTodayScore(){
  const today = new Date().toDateString();
  const saved = JSON.parse(localStorage.getItem('thai-score')||'{}');
  todayScore = saved[today] || 0;
  updateScoreBar();
}
function updateScoreBar(){
  document.getElementById('today-score').textContent = todayScore;
  document.getElementById('score-bar').style.width = Math.min(todayScore*2,100)+'%';
  if(todayScore<50) document.getElementById('lock-msg').classList.remove('hidden');
  else document.getElementById('lock-msg').classList.add('hidden');
}
function loadQuiz(){
  const quiz = words.sort(()=>0.5-Math.random()).slice(0,5);
  const box = document.getElementById('quiz-box');
  box.innerHTML = '<h3 class="font-bold mb-2">今日闯关：5题对3题才及格</h3>';
  quiz.forEach((q,i)=>{
    const options = [...words].sort(()=>0.5-Math.random()).slice(0,3).map(w=>w.zh);
    if(!options.includes(q.zh)) options[0] = q.zh;
    box.innerHTML += `<div class="mb-2">${i+1}. ${q.th}
      <select onchange="checkAns(this,'${q.zh}')" class="border rounded">
        <option>选择</option>${options.map(o=>`<option>${o}</option>`).join('')}
      </select></div>`;
  });
}
function checkAns(select,correct){
  if(select.value===correct){
    select.className='border-green-500 bg-green-50';
    todayScore+=10;
    const today = new Date().toDateString();
    const saved = JSON.parse(localStorage.getItem('thai-score')||'{}');
    saved[today] = todayScore;
    localStorage.setItem('thai-score',JSON.stringify(saved));
    updateScoreBar();
  } else {
    select.className='border-red-500 bg-red-50';
  }
}
function speak(text){
  if(!text) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'th-TH';
  speechSynthesis.speak(utter);
}
function speakWord(th,mp3){
  if(mp3){ new Audio(mp3).play(); }
  else { speak(th); }
}
</script>
</body>
</html>
