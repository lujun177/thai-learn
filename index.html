<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai 零基础 - Rayong生存版 v5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
   .tab-content { display: none; }
   .tab-content.active { display: block; }
   .word-span { cursor: pointer; padding: 0 2px; border-radius: 3px; }
   .word-span:hover { background: #dbeafe; }
   .letter-btn { font-family: 'Noto Sans Thai', sans-serif; }
   .tone-low{color:#3b82f6}.tone-mid{color:#10b981}.tone-high{color:#ef4444}
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
  <div class="max-w-md mx-auto min-h-screen flex flex-col">
    <header class="bg-blue-600 text-white p-4 text-center font-bold text-lg">
      Thai 零基础 - Pluak Daeng 生存版 v5
    </header>

    <main class="flex-1 p-4 pb-24 overflow-y-auto">
      <!-- 字母Tab v3.2版，省略... -->
      <div id="tab-letter" class="tab-content active">
        <h2 class="text-xl font-bold mb-2">字母支柱 - 辅音 Consonants</h2>
        <div id="consonant-grid" class="grid grid-cols-5 gap-1 text-center mb-4"></div>
        <h2 class="text-xl font-bold mb-2">元音 Vowels</h2>
        <div id="vowel-grid" class="grid grid-cols-4 gap-1 text-center"></div>
        <div class="mt-4 bg-white p-3 rounded shadow">
          <div class="text-2xl font-bold text-center" id="current-char">ก</div>
          <div class="text-sm text-center text-gray-500" id="current-info"></div>
          <canvas id="canvas" class="border w-full h-40 mt-2 bg-white"></canvas>
          <div class="flex gap-2 mt-2">
            <button onclick="clearCanvas()" class="bg-gray-300 px-3 py-1 rounded flex-1">清空</button>
            <button onclick="speak(currentChar)" class="bg-blue-500 text-white px-3 py-1 rounded flex-1">🔊 读一下</button>
          </div>
        </div>
      </div>

      <div id="tab-word" class="tab-content"><h2 class="text-xl font-bold mb-3">单词支柱</h2><div id="word-list" class="space-y-2"></div></div>
      <div id="tab-sentence" class="tab-content"><h2 class="text-xl font-bold mb-3">句子支柱</h2><div id="sentence-box" class="bg-white p-3 rounded shadow"></div></div>
      <div id="tab-read" class="tab-content"><h2 class="text-xl font-bold mb-3">浸泡支柱</h2><div id="read-sentence" class="bg-white p-4 rounded shadow text-lg leading-8"></div></div>
      <div id="tab-rayong" class="tab-content"><h2 class="text-xl font-bold mb-3">Rayong菜单 🍗</h2><div id="rayong-list" class="space-y-2"></div></div>
      <div id="tab-seven" class="tab-content"><h2 class="text-xl font-bold mb-3">7-11购物 🛒</h2><div id="seven-list" class="space-y-2"></div></div>

      <!-- 新增：双条车Tab -->
      <div id="tab-songthaew" class="tab-content">
        <h2 class="text-xl font-bold mb-3">双条车路线 🚐</h2>
        <div id="songthaew-list" class="space-y-2"></div>
        <button onclick="showSongthaewDialogue()" class="mt-4 w-full bg-blue-500 text-white py-2 rounded">砍价实战对话</button>
        <div id="songthaew-dialogue" class="bg-blue-50 p-3 mt-3 rounded hidden"></div>
      </div>

      <!-- 新增：租摩托Tab -->
      <div id="tab-motorbike" class="tab-content">
        <h2 class="text-xl font-bold mb-3">租摩托对话 🛵</h2>
        <div id="motorbike-list" class="space-y-2"></div>
        <button onclick="showMotorbikeDialogue()" class="mt-4 w-full bg-purple-500 text-white py-2 rounded">交警实战对话</button>
        <div id="motorbike-dialogue" class="bg-purple-50 p-3 mt-3 rounded hidden"></div>
      </div>

      <div id="tab-check" class="tab-content"><h2 class="text-xl font-bold mb-3">30天打卡</h2><div id="quiz-box" class="bg-white p-3 rounded shadow"></div></div>
    </main>

    <nav class="fixed bottom-0 w-full max-w-md bg-white border-t grid grid-cols-5 text-xs">
      <button onclick="switchTab('letter')" class="p-2">字母</button>
      <button onclick="switchTab('word')" class="p-2">单词</button>
      <button onclick="switchTab('rayong')" class="p-2">菜单</button>
      <button onclick="switchTab('seven')" class="p-2">7-11</button>
      <button onclick="switchTab('songthaew')" class="p-2">双条车</button>
      <button onclick="switchTab('motorbike')" class="p-2">租摩托</button>
      <button onclick="switchTab('sentence')" class="p-2">句子</button>
      <button onclick="switchTab('read')" class="p-2">阅读</button>
      <button onclick="switchTab('check')" class="p-2">打卡</button>
    </nav>
  </div>

<script>
// ===== 数据初始化 =====
let songthaewData = [], motorbikeData = [];
let currentChar = 'ก';

init();
async function init(){
  // v3.2的字母、单词等初始化代码省略，你用之前的就行
  try {
    songthaewData = await fetch('./songthaew.json').then(r=>r.json());
    motorbikeData = await fetch('./motorbike.json').then(r=>r.json());
    renderSongthaew();
    renderMotorbike();
  } catch(e){ console.log('json加载失败',e); }
}

// ===== 双条车模块 =====
function renderSongthaew(){
  const list = document.getElementById('songthaew-list');
  songthaewData.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'bg-white p-2 rounded shadow flex justify-between';
    div.innerHTML = `<div>${item.emoji} <b>${item.th}</b> ${item.zh} <span class="text-xs text-gray-500">${item.rt} ${item.price}</span></div>
                     <button onclick="speak('${item.th}')" class="bg-blue-100 px-2 py-1 rounded">🔊</button>`;
    list.appendChild(div);
  });
}
function showSongthaewDialogue(){
  document.getElementById('songthaew-dialogue').classList.remove('hidden');
  document.getElementById('songthaew-dialogue').innerHTML = `
    <div onclick="speak('ไปพัทยา เท่าไหร่')" class="cursor-pointer">你：ไปพัทยา เท่าไหร่<br><span class="text-xs text-gray-500">去芭提雅多少</span></div>
    <div onclick="speak('40 บาท')" class="cursor-pointer mt-2">司机：40 บาท<br><span class="text-xs text-gray-500">40泰铢</span></div>
    <div onclick="speak('ลดได้ไหม 30 ได้ไหม')" class="cursor-pointer mt-2">你：ลดได้ไหม 30 ได้ไหม<br><span class="text-xs text-gray-500">能便宜吗 30行吗</span></div>
  `;
}

// ===== 租摩托模块 =====
function renderMotorbike(){
  const list = document.getElementById('motorbike-list');
  motorbikeData.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'bg-white p-2 rounded shadow flex justify-between';
    div.innerHTML = `<div>${item.emoji} <b>${item.th}</b> ${item.zh} <span class="text-xs text-gray-500">${item.rt} ${item.price}</span></div>
                     <button onclick="speak('${item.th}')" class="bg-purple-100 px-2 py-1 rounded">🔊</button>`;
    list.appendChild(div);
  });
}
function showMotorbikeDialogue(){
  document.getElementById('motorbike-dialogue').classList.remove('hidden');
  document.getElementById('motorbike-dialogue').innerHTML = `
    <div onclick="speak('ใบขับขี่สากล ใช้ได้ไหม')" class="cursor-pointer">你：ใบขับขี่สากล ใช้ได้ไหม<br><span class="text-xs text-gray-500">国际驾照能用吗</span></div>
    <div onclick="speak('ได้ครับ แต่ต้องพกพาสปอร์ต')" class="cursor-pointer mt-2">警察：ได้ครับ แต่ต้องพกพาสปอร์ต<br><span class="text-xs text-gray-500">可以，但要带护照</span></div>
    <div onclick="speak('ขอโทษครับ ผมเป็นนักท่องเที่ยว')" class="cursor-pointer mt-2">你：ขอโทษครับ ผมเป็นนักท่องเที่ยว<br><span class="text-xs text-gray-500">对不起我是游客</span></div>
  `;
}

// ===== 通用函数 =====
function switchTab(name){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// 优先本地MP3版发音函数
function speak(text){
  if(!text) return;
  const audio = new Audio(`./audio/${text}.mp3`);
  audio.play().catch(e => {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'th-TH';
    speechSynthesis.speak(utter);
  });
}

// 其他v3.1的函数：renderConsonants, renderVowels, renderWords... 全部保留
// 为节省篇幅省略，你直接用v3.1的代码，把新增的这部分加上就行
</script>
</body>
</html>
