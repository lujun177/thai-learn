<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>泰语保命20句 - 罗勇版</title>
<style>
body{font-family:system-ui;background:#0f172a;color:#fff;padding:20px}
.card{background:#1e293b;padding:16px;border-radius:12px;margin:10px 0;display:flex;justify-content:space-between;align-items:center}
.th{font-size:20px;font-weight:bold}
.zh{color:#94a3b8}
button{background:#22c55e;border:0;padding:10px 16px;border-radius:8px;font-size:16px}
button:active{transform:scale(0.95)}
</style>
</head>
<body>
<h1>🇹🇭 罗勇保命20句 - 真人发音版</h1>
<div id="list"></div>

<script>
const data = [
["สวัสดี","你好"],
["ขอบคุณ","谢谢"],
["เท่าไหร่","多少钱"],
["ไปพัทยา เท่าไหร่","去芭提雅多少钱"],
["ลดได้ไหม","能便宜吗"],
["ใบขับขี่สากล ใช้ได้ไหม","国际驾照能用吗"],
["ขอโทษครับ","对不起"],
["ข้าวมันไก่","鸡油饭"],
["ส้มตำ","木瓜沙拉"],
["น้ำเปล่า","白水"],
["คิดเงินด้วย","买单"],
["จอดตรงนี้ครับ","停这里"],
["เช่ามอเตอร์ไซค์ วันละเท่าไหร่","租摩托一天多少"],
["เติมน้ำมัน 100 บาท","加100铢油"],
["ห้องน้ำอยู่ไหนครับ","厕所在哪"],
["อันนี้เท่าไหร่","这个多少"],
["ไปตลาดระยองยังไง","去罗勇市场怎么去"],
["ไม่เผ็ดครับ","不要辣"],
["เอาอันนี้ครับ","要这个"],
["มีห้องว่างไหมครับ","有空房吗"]
];

const list = document.getElementById('list');
data.forEach(([th, zh]) => {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `<div><div class="th">${th}</div><div class="zh">${zh}</div></div><button>▶️ 播放</button>`;
  div.querySelector('button').onclick = () => {
    // 1. 优先播你生成的真人MP3
    const url = `audio/${encodeURIComponent(th)}.mp3`;
    const audio = new Audio(url);
    audio.play().catch(()=>{
      // 2. 如果MP3没上传， fallback到浏览器TTS
      const u = new SpeechSynthesisUtterance(th);
      u.lang='th-TH'; speechSynthesis.speak(u);
    });
  };
  list.appendChild(div);
});
</script>
</body>
</html>
